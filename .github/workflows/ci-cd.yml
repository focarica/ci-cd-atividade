name: ci-cd Deploy

on:
  push:
    branches:
      - main
  pull_request: 

jobs:
  build:
    name: Build e Teste da Aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci
        
      - name: Rodar testes
        run: npm test 
      
      - name: Build
        run: npm run build

      - name: Salvar build do projeto
        uses: actions/upload-artifact@v7
        with:
          name: build-projeto
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar build do projeto
        uses: actions/download-artifact@v8
        with:
          name: build-projeto
          path: ./dist

      - name: Deploy no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist