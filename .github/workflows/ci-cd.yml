name: ci-cd Deploy

on:
  push:
    branches:
      - main
  pull_request: 

jobs:
  build:
    name: Build e Teste da Aplicação
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependencias
        run: npm ci
        
      - name: Rodar testes
        run: npm test 
      
      - name: Build
        run: npm run build

      - name: Salvar build do projeto
        uses: actions/upload-artifact@v7
        with:
          name: build-projeto
          path: ./dist